apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
- ../../base
images:
- name: ghcr.io/mingju-xu/flask-app
  newTag: staging-latest
patches:
- target:
    kind: Deployment
    name: flask-app
  patch: |
    - op: replace
      path: /spec/replicas
      value: 2
